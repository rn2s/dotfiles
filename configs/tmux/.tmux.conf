# ====================================================
# 1. プレフィックスキー設定: Ctrl-Space を採用
# ----------------------------------------------------
# プレフィックスキーを Ctrl-Space に設定
set -g prefix C-Space
# デフォルトの Ctrl-b のバインドを解除
unbind C-b

# ====================================================
# 2. キーバインドの設定
# ----------------------------------------------------
set -g status-keys emacs   # tmuxコマンドラインはEmacs風のまま
set -g mode-keys vi        # コピーモードはvim風（vterm再現）

# コピーモード: vterm/Evil mode風キーバインド
bind-key -T copy-mode-vi v   send-keys -X begin-selection              # v: ビジュアル選択
bind-key -T copy-mode-vi V   send-keys -X select-line                  # V: 行選択
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle             # C-v: 矩形選択
bind-key -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "pbcopy" # y: ヤンク→クリップボード
bind-key -T copy-mode-vi i   send-keys -X cancel                       # i: インサートモードへ戻る
bind-key -T copy-mode-vi Escape send-keys -X cancel                    # Esc: キャンセル

# Ctrl-Space v でcopy mode起動（vterm風）
bind v copy-mode

# ====================================================
# 3. 操作性向上のための追加設定 (推奨)
# ----------------------------------------------------
# マウス操作の有効化 (ペイン選択、サイズ変更、スクロールが可能に)
set -g mouse on

# 分割キーの変更 (より直感的に)
bind / split-window -h
bind - split-window -v
unbind %
unbind '"'

# ペイン移動: hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 設定ファイルを再読み込みするためのキーバインド (設定変更後、Prefix + r で反映)
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# ====================================================
# 4. プラグイン (TPM)
# ----------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'alexwforsythe/tmux-which-key'

run '~/.tmux/plugins/tpm/tpm'
